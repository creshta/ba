<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Button Basher Royale – Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e1a; --surface: #181828; --surface2: #1f1f32;
    --border: rgba(255,255,255,0.08); --text: #f0eeff; --muted: #8a86b0;
    --accent: #ff6b6b; --gold: #FFD700; --radius: 14px; --radius-sm: 8px;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif; min-height: 100vh; padding: 2rem 1rem 4rem; }
  body::before, body::after { content: ''; position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.18; pointer-events: none; z-index: 0; }
  body::before { width: 500px; height: 500px; background: #ff6b6b; top: -150px; left: -150px; animation: blob1 12s ease-in-out infinite alternate; }
  body::after { width: 400px; height: 400px; background: #a78bfa; bottom: -100px; right: -100px; animation: blob2 14s ease-in-out infinite alternate; }
  @keyframes blob1 { from { transform: translate(0,0) scale(1); } to { transform: translate(60px,40px) scale(1.1); } }
  @keyframes blob2 { from { transform: translate(0,0) scale(1); } to { transform: translate(-50px,-30px) scale(1.12); } }
  .page { max-width: 680px; margin: 0 auto; position: relative; z-index: 1; }
  .header { text-align: center; margin-bottom: 1.5rem; }
  .header h1 { font-family: 'Fredoka One', cursive; font-size: clamp(28px, 6vw, 42px); letter-spacing: 0.5px; line-height: 1.1; color: #fff; }
  .header h1 span { color: var(--accent); }
  .season-badge { display: inline-block; background: var(--accent); color: #fff; font-size: 11px; font-weight: 800; padding: 3px 12px; border-radius: 20px; letter-spacing: 1px; margin-left: 10px; vertical-align: middle; text-transform: uppercase; }
  .header p { font-size: 13px; color: var(--muted); margin-top: 6px; }
  .prize-banner { background: linear-gradient(135deg, #2a1f00 0%, #1a1500 100%); border: 1px solid rgba(255,215,0,0.35); border-radius: var(--radius); padding: 14px 20px; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 14px; }
  .prize-trophy { font-size: 32px; flex-shrink: 0; }
  .prize-text { flex: 1; }
  .prize-text .prize-label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,215,0,0.65); margin-bottom: 2px; }
  .prize-text .prize-amount { font-family: 'Fredoka One', cursive; font-size: 22px; color: var(--gold); line-height: 1.1; }
  .prize-text .prize-sub { font-size: 12px; color: rgba(255,215,0,0.55); margin-top: 2px; }
  .controls { display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .controls input, .controls select { flex: 1; min-width: 130px; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'Nunito', sans-serif; font-size: 13px; padding: 9px 14px; border-radius: var(--radius-sm); outline: none; transition: border-color 0.2s; }
  .controls input:focus, .controls select:focus { border-color: rgba(255,107,107,0.5); }
  .controls input::placeholder { color: var(--muted); }
  .controls select option { background: #1f1f32; }
  .discord-link { display: inline-flex; align-items: center; gap: 7px; background: #5865F2; color: #fff; font-family: 'Fredoka One', cursive; font-size: 15px; letter-spacing: 0.3px; padding: 9px 18px; border-radius: var(--radius-sm); text-decoration: none; white-space: nowrap; transition: background 0.15s, transform 0.1s; }
  .discord-link:hover { background: #4752c4; }
  .discord-link:active { transform: scale(0.97); }
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead th { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; padding: 10px 16px; border-bottom: 1px solid var(--border); text-align: left; background: var(--surface2); }
  thead th.right { text-align: right; }
  tbody tr { transition: background 0.15s; }
  tbody tr:hover { background: rgba(255,255,255,0.03); }
  tbody tr:not(:last-child) td { border-bottom: 1px solid var(--border); }
  td { padding: 12px 16px; font-size: 14px; color: var(--text); vertical-align: middle; }
  td.right { text-align: right; }
  .player-name { font-weight: 700; font-size: 15px; }
  .player-tag { font-size: 12px; color: var(--muted); font-weight: 600; margin-top: 1px; }
  .pts-val { font-family: 'Fredoka One', cursive; font-size: 17px; color: #fff; }
  .rank-cell { width: 44px; font-family: 'Fredoka One', cursive; font-size: 16px; color: var(--muted); text-align: center; }
  .rank-medal { font-size: 22px; line-height: 1; }
  .empty-state { text-align: center; padding: 3rem 1rem; color: var(--muted); }
  .empty-state .big { font-family: 'Fredoka One', cursive; font-size: 22px; color: var(--text); margin-bottom: 8px; }
  .footer { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; font-size: 12px; color: var(--muted); flex-wrap: wrap; gap: 6px; padding: 0 2px; }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <p>Fall Guys · Competitive Leaderboard</p>
  </div>

  <div class="prize-banner">
    <div class="prize-trophy">🏆</div>
    <div class="prize-text">
      <div class="prize-label">BBR Ranked — 1st Place, 2nd Place, 3rd Place</div>
      <div class="prize-amount">$50 for First, $30 for Second, $20 for Third</div>
      <div class="prize-sub">Top players of the leaderboard at the end of the ranked rotation wins!</div>
    </div>
  </div>

  <div class="controls">
    <input type="text" id="search" placeholder="🔍 Search player…" oninput="render()">
    <select id="sort-by" onchange="render()">
      <option value="pts">Sort: Points</option>
      <option value="name">Sort: Name A–Z</option>
    </select>
    <a class="discord-link" href="https://discord.gg/F6ZDWYKedW" target="_blank" rel="noopener noreferrer">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
      Join Discord to Submit
    </a>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:44px; text-align:center">#</th>
          <th>Player</th>
          <th class="right">Points (RP)</th>
        </tr>
      </thead>
      <tbody id="lb-body"></tbody>
    </table>
  </div>

  <div class="footer">
    <span id="player-count">0 players</span>
    <span>Players sorted by Points (RP)</span>
  </div>
</div>

<script>
let players = [
  { id:1, name:'Chacey', tag:'#1', pts:110 },
  { id:2, name:'Hicham', tag:'#2', pts:25 },
  { id:3, name:'Justin', tag:'#3', pts:780 },
  { id:4, name:'Bassam', tag:'#4', pts:3045 },
  { id:5, name:'Zorkiz', tag:'#5', pts:2635 },
  { id:6, name:'BaleyBW', tag:'#6', pts:4025 },
  { id:7, name:'Phonics', tag:'#7', pts:95 },
  { id:8, name:'Cooke', tag:'#8', pts:615 },
  { id:9, name:'ForwardPike740', tag:'#9', pts:4030 },
  { id:10, name:'Miki', tag:'#10', pts:80 }

];

const MEDALS = ['🥇', '🥈', '🥉'];

function esc(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])
  );
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const sortBy = document.getElementById('sort-by').value;
  let list = players.filter(p =>
    p.name.toLowerCase().includes(q) || (p.tag && p.tag.toLowerCase().includes(q))
  );
  list = [...list].sort((a, b) =>
    sortBy === 'name' ? a.name.localeCompare(b.name) : b.pts - a.pts
  );

  const tbody = document.getElementById('lb-body');
  if (!list.length) {
    tbody.innerHTML = `<tr><td colspan="3"><div class="empty-state"><div class="big">No players found</div></div></td></tr>`;
    document.getElementById('player-count').textContent = '0 players';
    return;
  }

  tbody.innerHTML = list.map((p, i) => {
    let rankDisplay;
    if (sortBy === 'pts' && i < 3) {
      rankDisplay = `<span class="rank-medal">${MEDALS[i]}</span>`;
    } else {
      rankDisplay = `<span style="color:var(--muted)">${i + 1}</span>`;
    }
    return `<tr>
      <td class="rank-cell">${rankDisplay}</td>
      <td>
        <div class="player-name">${esc(p.name)}</div>
        ${p.tag ? `<div class="player-tag">${esc(p.tag)}</div>` : ''}
      </td>
      <td class="right"><span class="pts-val">${p.pts.toLocaleString()}</span></td>
    </tr>`;
  }).join('');

  document.getElementById('player-count').textContent =
    `${players.length} player${players.length !== 1 ? 's' : ''}`;
}

render();
</script>
</body></html>
